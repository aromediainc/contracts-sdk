name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs of this workflow for the same ref. Two pushes
# to the same PR shouldn't have both CI runs racing.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Tripwire: if generated files drift from committed copies, fail CI so
      # PRs that touch ABIs are forced to regenerate. The sync-abis workflow
      # is the supported way to update them.
      - name: Verify generated files are up to date
        run: |
          if [ -n "$(git status --porcelain src/generated/)" ]; then
            echo "::error::src/generated/ is out of sync. Re-run 'npm run generate' against the contracts repo and commit the result."
            git diff src/generated/
            exit 1
          fi
