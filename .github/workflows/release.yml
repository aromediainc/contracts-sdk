name: Release

on:
  push:
    branches: [main]

# Only one release job in flight at a time — concurrent merges shouldn't
# race on creating the Version PR or publishing.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

# Required permissions for the changesets action to open PRs, push tags,
# and (when `provenance` is enabled in package.json) publish to npm with
# attestations.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Changesets needs full history to compute changelogs and tags.
          fetch-depth: 0
          # Use a PAT or GITHUB_TOKEN with workflow scope so the Version
          # PR can re-trigger CI on its own commits.
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # registry-url is required so `npm publish` knows where to push
          # and how to interpret NODE_AUTH_TOKEN.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version` consumes pending changesets and updates package.json
          # + CHANGELOG.md in a PR titled "Version Packages". `publish`
          # runs after the Version PR merges (when there are no pending
          # changesets) and pushes to npm.
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
