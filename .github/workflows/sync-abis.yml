name: Sync ABIs from contracts repo

on:
  # Nightly at 06:00 UTC. Adjust if the contracts repo's release cadence
  # is faster/slower than once a day.
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger so you can force a regen after a contracts deploy.
  workflow_dispatch:
    inputs:
      contracts_ref:
        description: "Ref of aromedia-blockchain-contracts to use (branch, tag, or SHA)"
        required: false
        default: "main"

# Don't queue up sync runs — a second-most-recent sync would just produce
# a stale PR that the latest run would immediately supersede.
concurrency:
  group: sync-abis
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Regenerate ABIs + addresses
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CONTRACTS_REPO: aromediainc/aromedia-blockchain-contracts
      CONTRACTS_REF: ${{ github.event.inputs.contracts_ref || 'main' }}

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          # peter-evans/create-pull-request needs a clean tree, but we also
          # want a token that can push the PR branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout contracts repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONTRACTS_REPO }}
          ref: ${{ env.CONTRACTS_REF }}
          path: contracts-repo
          # The contracts repo is private — this needs a PAT with `repo`
          # scope stored as CONTRACTS_REPO_TOKEN. If the contracts repo
          # is public, GITHUB_TOKEN is enough; swap accordingly.
          token: ${{ secrets.CONTRACTS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The contracts repo pulls OZ community contracts in its postinstall.
      # We disable scripts during npm ci to keep the install side-effect
      # free; setup-community-contracts is run explicitly when compile-time
      # source resolution needs it (it doesn't for our case — we only
      # consume artifacts/).
      - name: Install SDK dependencies
        run: npm ci

      - name: Install contracts repo dependencies
        working-directory: contracts-repo
        run: npm ci --ignore-scripts || npm install --ignore-scripts --no-audit --no-fund

      - name: Run contracts repo postinstall
        working-directory: contracts-repo
        run: node scripts/setup-community-contracts.js
        continue-on-error: true

      - name: Compile contracts
        working-directory: contracts-repo
        run: npx hardhat compile

      - name: Regenerate ABIs + addresses
        env:
          CONTRACTS_REPO_PATH: ${{ github.workspace }}/contracts-repo
        run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain src/generated/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Generated files changed:"
            git diff --stat src/generated/
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to generated files."
          fi

      - name: Create changeset for the sync
        if: steps.diff.outputs.changed == 'true'
        run: |
          SLUG="sync-abis-$(date -u +%Y-%m-%d)"
          cat > .changeset/${SLUG}.md <<EOF
          ---
          "@aromedia/contracts-sdk": patch
          ---

          Sync ABIs and addresses from \`${{ env.CONTRACTS_REPO }}@${{ env.CONTRACTS_REF }}\`.

          Auto-generated by the \`sync-abis\` workflow on $(date -u +%Y-%m-%d).
          Review the diff under \`src/generated/\` to confirm whether this should
          be bumped to a minor (additive) or major (breaking) release before merge.
          EOF

      - name: Open Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-abis
          base: main
          commit-message: "chore: sync ABIs from contracts repo"
          title: "chore: sync ABIs from contracts repo"
          body: |
            Auto-generated by the **sync-abis** workflow.

            - Contracts repo: `${{ env.CONTRACTS_REPO }}@${{ env.CONTRACTS_REF }}`
            - Triggered: ${{ github.event_name }}

            Review the diff under `src/generated/` and adjust the changeset bump
            level if any ABI changes are breaking (default is `patch`).
          labels: |
            automated
            abi-sync
